services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    environment:
      NODE_ENV: production
      API_PORT: "3001"
      FIND_CORE_PORT: "8787"
      MCP_PORT: "9090"
      PORT: "3000"
      DATABASE_URL: file:/data/db/find_unified.db
      FIND_CORE_URL: http://127.0.0.1:8787
      FIND_CONFIG_PATH: /data/config/sources.json
      SYNC_HTTP_DIR: /data/docs
      INGEST_TOKEN: ${INGEST_TOKEN:-ingest-dev-token}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    volumes:
      - db_data:/data/db
      - docs_data:/data/docs
      - config_data:/data/config
      - skills_data:/app/apps/api/skills
    ports:
      - "3000:3000"
      - "3001:3001"
    restart: unless-stopped

volumes:
  db_data:
  docs_data:
  config_data:
  skills_data:
